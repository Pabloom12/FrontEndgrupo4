<!doctype html>
<!-- Tipo de documento HTML5 -->
<html lang="es">
  <!-- Idioma de la página configurado a español -->
  <head>
    <!-- Conjunto de caracteres para la página -->
    <meta charset="UTF-8" />
    <!-- Permite que el diseño responda al ancho de pantalla de dispositivos móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Título que se muestra en la pestaña del navegador -->
    <title>Revista Digital</title>
    <!-- CSS de Bootstrap desde CDN para estilos y componentes listos -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <!-- Iconos de Bootstrap disponibles mediante CDN -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <!-- Estilos personalizados del proyecto -->
    <link rel="stylesheet" href="/front/css/estilos.css" />
  </head>
  <body>
    <!-- Barra de navegación simple con el nombre del sitio -->
    <nav>Sabor Oriental</nav>
    <main>
      <!-- Sección principal de cabecera con un contenedor Bootstrap -->
      <hero class="container my-5">
        <h1 class="">
          <!-- Imagen del título del sitio -->
          <img
            src="/front/imagenes/titulo.png"
            width="400px"
            height="auto"
            alt="titulo"
          />
        </h1>
      </hero>
      <!-- Bloque índice o tarjeta principal -->
      <section class="indice">
        <div class="card" style="width: 18rem">
          <!-- Imagen dentro de la tarjeta -->
          <img
            src="/front/imagenes/matecard.png"
            width="150px height=auto"
            class="card-img-top"
            alt="..."
          />
          <div class="card-body">
            <!-- Título de la tarjeta -->
            <h5 class="card-title">Card title</h5>
            <!-- Texto descriptivo de la tarjeta -->
            <p class="card-text">Mate.</p>
            <!-- Botón con clase personalizada; actualmente no es un enlace real -->
            <button href="#" class="botonmate">Ir</button>
          </div>
        </div>
      </section>
      <!-- Secciones vacías para futuros artículos o contenido adicional -->
      <section class="articulo1"></section>
      <section class="articulo2"></section>
      <section class="articulo3"></section>
      <section class="articulo4"></section>
      <section class="articulo5"></section>

      <!-- Pie de página del sitio -->
      <footer>Hola soy el footer</footer>
    </main>
    <!-- JavaScript de Bootstrap para funcionalidad de componentes -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <!-- Enlace al archivo JavaScript local del proyecto -->
    <script src="index.js"></script>
  </body>
</html>
